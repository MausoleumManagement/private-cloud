apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vlinsert
    app.kubernetes.io/instance: victoria-logs-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: victoria-logs-cluster
    app.kubernetes.io/version: v1.48.0
    helm.sh/chart: victoria-logs-cluster-0.0.31
  name: victoria-logs-vlinsert
  namespace: victoria-logs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vlinsert
      app.kubernetes.io/instance: victoria-logs-release
      app.kubernetes.io/name: victoria-logs-cluster
  template:
    metadata:
      labels:
        app: vlinsert
        app.kubernetes.io/instance: victoria-logs-release
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: victoria-logs-cluster
    spec:
      containers:
      - args:
        - --envflag.enable
        - --http.shutdownDelay=15s
        - --httpListenAddr=:9481
        - --loggerFormat=json
        - --select.disable
        - --storageNode=victoria-logs-vlstorage-0.victoria-logs-vlstorage.victoria-logs.svc.cluster.local.:9491
        - --storageNode=victoria-logs-vlstorage-1.victoria-logs-vlstorage.victoria-logs.svc.cluster.local.:9491
        image: victoriametrics/victoria-logs:v1.48.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 5
          periodSeconds: 15
          tcpSocket:
            port: http
          timeoutSeconds: 5
        name: vlinsert
        ports:
        - containerPort: 9481
          name: http
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
        securityContext:
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
