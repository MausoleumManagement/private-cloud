  data:
  - remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: kv/nekropolis/forgejo/cnpg-forgejo-app-user
      metadataPolicy: None
      property: password
    secretKey: db_password
  - remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: kv/nekropolis/forgejo/valkey
      metadataPolicy: None
      property: password
    secretKey: valkey_password
  refreshInterval: 1h0m0s
  refreshPolicy: Periodic
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-backend
  target:
    name: forgejo-inline-config
    template:
      data:
        _generals_: 'APP_NAME=The Ebon Enginarium: Dark Dreams Deprave Decrepit Dungeon
          Dwelling Developer.'
        cache: |-
          ADAPTER=redis
          HOST=redis://:{{ .valkey_password }}@valkey:6379/1
        database: |-
          DB_TYPE=postgres
          HOST=cnpg-forgejo-rw:5432
          NAME=forgejo
          USER=forgejo
          PASSWD={{ .db_password }}
        indexer: |-
          ISSUE_INDEXER_TYPE=db
          REPO_INDEXER_ENABLED=false
        metrics: ENABLED=false
        queue: |-
          TYPE=redis
          CONN_STR=redis://:{{ .valkey_password }}@valkey:6379/0?
        repository: ROOT=/data/git/gitea-repositories
        security: INSTALL_LOCK=true
        server: |-
          HTTP_PORT=3000
          PROTOCOL=http
          DOMAIN=forgejo.irminsul
          ROOT_URL=https://forgejo.irminsul/
          SSH_DOMAIN=forgejo.irminsul
          SSH_PORT=22
          SSH_LISTEN_PORT=2222
          START_SSH_SERVER=true
          APP_DATA_PATH=/data
          ENABLE_PPROF=false
        session: |-
          PROVIDER=redis
          PROVIDER_CONFIG=redis://:{{ .valkey_password }}@valkey:6379/2
      engineVersion: v2
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: valkey
  namespace: forgejo
spec:
  data:
  - remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: kv/nekropolis/forgejo/valkey
      metadataPolicy: None
      property: password
    secretKey: password
  refreshInterval: 1h0m0s
  refreshPolicy: Periodic
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-backend
  target:
    name: valkey
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: local-ca-issuer
    kube-vip.io/loadbalancerIPs: 192.168.13.6
  name: forgejo
  namespace: forgejo
spec:
  ingressClassName: cilium
  rules:
  - host: forgejo.nekropolis.irminsul
    http:
      paths:
      - backend:
          service:
            name: forgejo-http
            port:
              number: 3000
        path: /
        pathType: Prefix
  - host: forgejo.irminsul
    http:
      paths:
      - backend:
          service:
            name: forgejo-http
            port:
              number: 3000
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - forgejo.nekropolis.irminsul
    - forgejo.irminsul
    secretName: forgejo
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-forgejo
  namespace: forgejo
spec:
  bootstrap:
    initdb:
      database: forgejo
      owner: forgejo
      secret:
        name: cnpg-forgejo-app-user
  instances: 3
  storage:
    size: 10Gi
  superuserSecret:
    name: cnpg-forgejo-superuser
