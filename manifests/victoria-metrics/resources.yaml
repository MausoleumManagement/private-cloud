apiVersion: v1
kind: Service
metadata:
  labels:
    app: vmstorage
    app.kubernetes.io/instance: victoria-metrics-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: victoria-metrics-cluster
    app.kubernetes.io/version: v1.139.0-cluster
    helm.sh/chart: victoria-metrics-cluster-0.38.0
  name: victoria-metrics-release-victoria-metrics-cluster-vmstorage
  namespace: victoria-metrics
spec:
  clusterIP: None
  ports:
  - name: http
    port: 8482
    protocol: TCP
    targetPort: http
  - name: vmselect
    port: 8401
    protocol: TCP
    targetPort: vmselect
  - name: vminsert
    port: 8400
    protocol: TCP
    targetPort: vminsert
  selector:
    app: vmstorage
    app.kubernetes.io/instance: victoria-metrics-release
    app.kubernetes.io/name: victoria-metrics-cluster
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vmauth
    app.kubernetes.io/instance: victoria-metrics-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: victoria-metrics-cluster
    app.kubernetes.io/version: v1.139.0
    helm.sh/chart: victoria-metrics-cluster-0.38.0
  name: victoria-metrics-release-victoria-metrics-cluster-vmauth
  namespace: victoria-metrics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vmauth
      app.kubernetes.io/instance: victoria-metrics-release
      app.kubernetes.io/name: victoria-metrics-cluster
  template:
    metadata:
      labels:
        app: vmauth
        app.kubernetes.io/instance: victoria-metrics-release
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: victoria-metrics-cluster
    spec:
      automountServiceAccountToken: true
      containers:
      - args:
        - --auth.config=/config/auth.yml
        - --envflag.enable
        - --envflag.prefix=VM_
        - --httpListenAddr=:8427
        - --loggerFormat=json
        image: victoriametrics/vmauth:v1.139.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 5
          periodSeconds: 15
          tcpSocket:
            port: http
          timeoutSeconds: 5
        name: vmauth
        ports:
        - containerPort: 8427
          name: http
        readinessProbe:
          failureThreshold: 10
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
        volumeMounts:
        - mountPath: /config
          name: config
      serviceAccountName: victoria-metrics-release-victoria-metrics-cluster
      volumes:
      - name: config
        secret:
          secretName: vmauth-config
---
