apiVersion: v1
kind: Namespace
metadata:
  name: victoria-logs-collector
---
apiVersion: v1
automountServiceAccountToken: true
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: victoria-logs-collector
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: victoria-logs-collector
    app.kubernetes.io/version: v1.48.0
    helm.sh/chart: victoria-logs-collector-0.2.14
  name: victoria-logs-collector
  namespace: victoria-logs-collector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: victoria-logs-collector
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: victoria-logs-collector
    app.kubernetes.io/version: v1.48.0
    helm.sh/chart: victoria-logs-collector-0.2.14
  name: victoria-logs-collector
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - namespaces
  - pods
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: victoria-logs-collector
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: victoria-logs-collector
    app.kubernetes.io/version: v1.48.0
    helm.sh/chart: victoria-logs-collector-0.2.14
  name: victoria-logs-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: victoria-logs-collector
subjects:
- kind: ServiceAccount
  name: victoria-logs-collector
  namespace: victoria-logs-collector
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/instance: victoria-logs-collector
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: victoria-logs-collector
    app.kubernetes.io/version: v1.48.0
    helm.sh/chart: victoria-logs-collector-0.2.14
  name: victoria-logs-collector
  namespace: victoria-logs-collector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: victoria-logs-collector
      app.kubernetes.io/name: victoria-logs-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: victoria-logs-collector
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: victoria-logs-collector
    spec:
      containers:
      - args:
        - --envflag.enable
        - --envflag.prefix=VL_
        - --kubernetesCollector
        - --kubernetesCollector.includeNodeAnnotations=false
        - --kubernetesCollector.includeNodeLabels=false
        - --kubernetesCollector.includePodAnnotations=false
        - --kubernetesCollector.includePodLabels
        - --kubernetesCollector.msgField=message,msg,log
        - --kubernetesCollector.streamFields=kubernetes.container_name,kubernetes.pod_name,kubernetes.pod_namespace
        - --kubernetesCollector.timeField=time,ts,timestamp
        - --loggerFormat=json
        - --remoteWrite.headers="AccountID:0^^ProjectID:0"
        - --remoteWrite.maxDiskUsagePerURL=10GB
        - --remoteWrite.url=http://victoria-logs-vmauth.victoria-logs.svc.cluster.local:8427/insert/native
        - --tmpDataPath=/var/lib/vl-collector
        image: victoriametrics/vlagent:v1.48.0
        imagePullPolicy: IfNotPresent
        name: vlagent
        ports:
        - containerPort: 9429
          name: http
          protocol: TCP
        securityContext: {}
        volumeMounts:
        - mountPath: /var/log
          name: varlog
          readOnly: true
        - mountPath: /var/lib
          name: varlib
          readOnly: true
        - mountPath: /var/lib/vl-collector
          name: vl-collector-data
      securityContext: {}
      serviceAccountName: victoria-logs-collector
      volumes:
      - hostPath:
          path: /var/log
        name: varlog
      - hostPath:
          path: /var/lib
        name: varlib
      - hostPath:
          path: /var/lib/vl-collector
        name: vl-collector-data
