                              description: |-
                                VMIDRangeEnd is the end of the VMID range to use for VMs.
                                Only used if VMIDRangeStart is set.
                              format: int64
                              maximum: 999999999
                              minimum: 100
                              type: integer
                            start:
                              description: VMIDRangeStart is the start of the VMID
