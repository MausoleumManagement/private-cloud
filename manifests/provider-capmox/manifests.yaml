                      - message: Must set full=true when specifying storage
                        rule: self.full || !has(self.storage)
                    type: object
                  sshAuthorizedKeys:
                    description: SshAuthorizedKeys contains the authorized keys deployed
                      to the PROXMOX VMs.
                    items:
                      type: string
                    type: array
                  virtualIPNetworkInterface:
                    description: VirtualIPNetworkInterface is the interface the k8s
                      control plane binds to.
                    type: string
                required:
                - machineSpec
                type: object
              controlPlaneEndpoint:
                description: ControlPlaneEndpoint represents the endpoint used to
