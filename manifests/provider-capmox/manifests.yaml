apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: cluster-api-provider-proxmox
    app.kubernetes.io/instance: controller-manager
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: deployment
    app.kubernetes.io/part-of: cluster-api-provider-proxmox
    cluster.x-k8s.io/provider: infrastructure-proxmox
    clusterctl.cluster.x-k8s.io: ""
    control-plane: controller-manager
  name: capmox-controller-manager
  namespace: capmox-system
spec:
  replicas: 1
  selector:
    matchLabels:
      cluster.x-k8s.io/provider: infrastructure-proxmox
      control-plane: controller-manager
  strategy: {}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        cluster.x-k8s.io/provider: infrastructure-proxmox
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --leader-elect
        - --feature-gates=ClusterTopology=false
        - --diagnostics-address=:8443
        - --insecure-diagnostics=false
        - --v=0
        env:
        - name: PROXMOX_URL
          valueFrom:
            secretKeyRef:
              key: url
              name: capmox-manager-credentials
        - name: PROXMOX_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: capmox-manager-credentials
        - name: PROXMOX_SECRET
          valueFrom:
            secretKeyRef:
              key: secret
              name: capmox-manager-credentials
        image: ghcr.io/ionos-cloud/cluster-api-provider-proxmox:v0.8.1
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: capmox-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: webhook-server-cert
status: {}
