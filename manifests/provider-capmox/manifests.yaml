apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: cluster-api-provider-proxmox
    app.kubernetes.io/instance: system
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: namespace
    app.kubernetes.io/part-of: cluster-api-provider-proxmox
    cluster.x-k8s.io/provider: infrastructure-proxmox
    clusterctl.cluster.x-k8s.io: ""
    control-plane: controller-manager
  name: capmox-system
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    cert-manager.io/inject-ca-from: capmox-system/capmox-serving-cert
    controller-gen.kubebuilder.io/version: v0.18.0
  labels:
    cluster.x-k8s.io/provider: infrastructure-proxmox
    cluster.x-k8s.io/v1beta1: v1alpha2
    cluster.x-k8s.io/v1beta2: v1alpha2
    clusterctl.cluster.x-k8s.io: ""
  name: proxmoxclusters.infrastructure.cluster.x-k8s.io
spec:
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          name: capmox-webhook-service
          namespace: capmox-system
          path: /convert
      conversionReviewVersions:
      - v1
  group: infrastructure.cluster.x-k8s.io
  names:
    categories:
    - cluster-api
    kind: ProxmoxCluster
    listKind: ProxmoxClusterList
    plural: proxmoxclusters
    singular: proxmoxcluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Cluster
      jsonPath: .metadata.labels['cluster\.x-k8s\.io/cluster-name']
      name: Cluster
      type: string
    - description: Cluster infrastructure is ready
      jsonPath: .status.ready
      name: Ready
      type: string
    - description: API Endpoint
      jsonPath: .spec.controlPlaneEndpoint
      name: Endpoint
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ProxmoxCluster is the Schema for the proxmoxclusters API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProxmoxClusterSpec defines the desired state of a ProxmoxCluster.
            properties:
              allowedNodes:
                description: |-
                  AllowedNodes specifies all Proxmox nodes which will be considered
                  for operations. This implies that VMs can be cloned on different nodes from
                  the node which holds the VM template.
                items:
                  type: string
                type: array
              cloneSpec:
                description: |-
                  NodeCloneSpec is the configuration pertaining to all items configurable
                  in the configuration and cloning of a proxmox VM. Multiple types of nodes can be specified.
                properties:
                  machineSpec:
                    additionalProperties:
                      description: ProxmoxMachineSpec defines the desired state of
                        a ProxmoxMachine.
                      properties:
                        allowedNodes:
                          description: |-
                            AllowedNodes specifies all Proxmox nodes which will be considered
                            for operations. This implies that VMs can be cloned on different nodes from
                            the node which holds the VM template.

                            This field is optional and should only be set if you want to restrict
                            the nodes where the VM can be cloned.
                            If not set, the ProxmoxCluster will be used to determine the nodes.
                          items:
                            type: string
                          type: array
                        checks:
                          description: Checks defines possibles checks to skip.
                          properties:
                            skipCloudInitStatus:
                              description: Skip checking CloudInit which can be very
                                useful for specific Operating Systems like TalOS
                              type: boolean
                            skipQemuGuestAgent:
                              description: Skip checking QEMU Agent readiness which
                                can be very useful for specific Operating Systems
                                like TalOS
                              type: boolean
                          type: object
                        description:
                          description: Description for the new VM.
                          type: string
                        disks:
                          description: |-
                            Disks contains a set of disk configuration options,
                            which will be applied before the first startup.
                          properties:
                            bootVolume:
                              description: |-
                                BootVolume defines the storage size for the boot volume.
                                This field is optional, and should only be set if you want
                                to change the size of the boot volume.
                              properties:
                                disk:
                                  description: |-
                                    Disk is the name of the disk device, that should be resized.
                                    Example values are: ide[0-3], scsi[0-30], sata[0-5].
                                  type: string
                                sizeGb:
                                  description: |-
                                    Size defines the size in gigabyte.

                                    As Proxmox does not support shrinking, the size
                                    must be bigger than the already configured size in the
                                    template.
                                  format: int32
                                  minimum: 5
                                  type: integer
                              required:
                              - disk
                              - sizeGb
                              type: object
                              x-kubernetes-validations:
                              - message: Value is immutable
                                rule: self == oldSelf
                          type: object
                        format:
                          description: Format for file storage. Only valid for full
                            clone.
                          enum:
                          - raw
                          - qcow2
                          - vmdk
                          type: string
                        full:
                          default: true
                          description: |-
                            Full Create a full copy of all disks.
                            This is always done when you clone a normal VM.
                            Create a Full clone by default.
                          type: boolean
                        memoryMiB:
                          description: |-
                            MemoryMiB is the size of a virtual machine's memory, in MiB.
                            Defaults to the property value in the template from which the virtual machine is cloned.
                          format: int32
                          multipleOf: 8
                          type: integer
                        metadataSettings:
                          description: MetadataSettings defines the metadata settings
                            for this machine's VM.
                          properties:
                            providerIDInjection:
                              description: |-
                                ProviderIDInjection enables the injection of the `providerID` into the cloudinit metadata.
                                this will basically set the `provider-id` field in the metadata to `proxmox://<instanceID>`.
                              type: boolean
                          type: object
                        network:
                          description: Network is the network configuration for this
                            machine's VM.
                          properties:
                            additionalDevices:
                              description: AdditionalDevices defines additional network
