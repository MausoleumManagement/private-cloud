apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# https://github.com/perses/helm-charts
# https://perses.dev/helm-charts/docs/installation/
# https://artifacthub.io/packages/helm/perses/perses

namespace: perses

helmCharts:
  - name: perses
    namespace: perses
    repo: https://perses.github.io/helm-charts
    version: 0.21.0
    releaseName: perses
    valuesFile: values.yaml

resources:
  - namespace.yaml
  - externalsecrets.yaml