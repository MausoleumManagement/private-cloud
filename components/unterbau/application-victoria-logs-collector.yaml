apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-logs-collector
  #this finaliser causes cascading deletion (delete children)
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  syncPolicy:
    automated:
      enabled: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
  destination:
    namespace: victoria-logs
    server: "https://kubernetes.default.svc"
  project: unterbau
  source:
    path: manifests/victoria-logs-collector
    repoURL: "https://github.com/MausoleumManagement/private-cloud.git"
    targetRevision: master
