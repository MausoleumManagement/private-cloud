apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: nekropolis-worker
spec:
  template:
    spec:
      preKubeadmCommands:
        # Configure containerd to use the certs.d directory for registry mirrors
        - mkdir -p /etc/containerd/certs.d
        - "[ -f /etc/containerd/config.toml ] || containerd config default > /etc/containerd/config.toml"
        - grep -q 'config_path = "/etc/containerd/certs.d"' /etc/containerd/config.toml || sed -i 's|config_path = ""|config_path = "/etc/containerd/certs.d"|g' /etc/containerd/config.toml
        - systemctl restart containerd
      files:
        # Registry mirrors via containerd hosts.toml (certs.d approach).
        # skip_verify is used for the Harbor host because the local CA cert rotates every 90 days
        # and embedding it statically would break when cert-manager renews it.
        # The fallback entries (public registries) ensure images can still be pulled if Harbor is down.
        # TODO: Replace NEKROPOLIS_CA_CERT_PEM with the output of:
        # kubectl get secret root-secret -n cert-manager -o jsonpath='{.data.ca\.crt}' | base64 -d
        - path: /etc/containerd/certs.d/nekropolis-ca.crt
          owner: "root:root"
          permissions: "0644"
          content: |
            NEKROPOLIS_CA_CERT_PEM
        - path: /etc/containerd/certs.d/docker.io/hosts.toml
          owner: "root:root"
          permissions: "0644"
          content: |
            server = "https://registry-1.docker.io"

            [host."https://harbor.nekropolis.irminsul/v2/dockerhub-proxy"]
              capabilities = ["pull", "resolve"]
              ca = ["/etc/containerd/certs.d/nekropolis-ca.crt"]

            [host."https://registry-1.docker.io"]
              capabilities = ["pull", "resolve"]
        - path: /etc/containerd/certs.d/ghcr.io/hosts.toml
          owner: "root:root"
          permissions: "0644"
          content: |
            server = "https://ghcr.io"

            [host."https://harbor.nekropolis.irminsul/v2/ghcr-proxy"]
              capabilities = ["pull", "resolve"]
              ca = ["/etc/containerd/certs.d/nekropolis-ca.crt"]

            [host."https://ghcr.io"]
              capabilities = ["pull", "resolve"]
        - path: /etc/containerd/certs.d/quay.io/hosts.toml
          owner: "root:root"
          permissions: "0644"
          content: |
            server = "https://quay.io"

            [host."https://harbor.nekropolis.irminsul/v2/quay-proxy"]
              capabilities = ["pull", "resolve"]
              ca = ["/etc/containerd/certs.d/nekropolis-ca.crt"]

            [host."https://quay.io"]
              capabilities = ["pull", "resolve"]
        - path: /etc/containerd/certs.d/registry.k8s.io/hosts.toml
          owner: "root:root"
          permissions: "0644"
          content: |
            server = "https://registry.k8s.io"

            [host."https://harbor.nekropolis.irminsul/v2/k8s-proxy"]
              capabilities = ["pull", "resolve"]
              ca = ["/etc/containerd/certs.d/nekropolis-ca.crt"]

            [host."https://registry.k8s.io"]
              capabilities = ["pull", "resolve"]
        # by default, the kubelet uses a certificate with its hostname as subject
        # that makes the metrics server sad, because it accesses them via IP
        # we patch the kubelet config so the kubelets ask for certificates
        # which the metrics server can actually use to talk to the kubelets via TLS
        # https://kubernetes.io/docs/reference/access-authn-authz/kubelet-tls-bootstrapping/
        # https://www.zeng.dev/post/2023-kubeadm-enable-kubelet-serving-certs/
        # https://cluster-api.sigs.k8s.io/tasks/bootstrap/kubeadm-bootstrap/kubelet-config#use-kubeadms-kubeletconfiguration-patch-target
        - path: /etc/kubernetes/patches/kubeletconfiguration0+strategic.json
          owner: "root:root"
          permissions: "0600"
          content: |
            {
              "apiVersion": "kubelet.config.k8s.io/v1beta1",
              "kind": "KubeletConfiguration",
              "serverTLSBootstrap": true
            }
      format: cloud-config
      initConfiguration:
        patches:
          directory: /etc/kubernetes/patches
      joinConfiguration:
        patches:
          directory: /etc/kubernetes/patches
        nodeRegistration:
          imagePullPolicy: IfNotPresent
          kubeletExtraArgs:
            - name: provider-id
              value: "proxmox://'{{ ds.meta_data.instance_id }}'"
      users:
        - name: root
          sshAuthorizedKeys:
            - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJeA+KvPI+y/OtbCkWpKTt9bpGKXkDtwZX3pdjzeRuRD
              Leon Welchert privat
