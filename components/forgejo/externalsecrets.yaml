# Admin credentials for the Forgejo admin user, referenced via gitea.admin.existingSecret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-admin-secret
spec:
  data:
    - secretKey: username
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: kv/nekropolis/forgejo/forgejo-admin-secret
        metadataPolicy: None
        property: username
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: kv/nekropolis/forgejo/forgejo-admin-secret
        metadataPolicy: None
        property: password
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-backend
  target:
    name: forgejo-admin-secret
  refreshPolicy: Periodic
  refreshInterval: 1h0m0s
---
# Inline config secret — replaces the helm-generated forgejo-inline-config Secret.
# The helm chart's init container reads each key as a section name and each value as a
# newline-delimited list of key=value pairs, converting them to app.ini via env2ini.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-inline-config
spec:
  data:
    - secretKey: db_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: kv/nekropolis/forgejo/cnpg-forgejo-app-user
        metadataPolicy: None
        property: password
    - secretKey: valkey_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: kv/nekropolis/forgejo/valkey
        metadataPolicy: None
        property: password
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-backend
  target:
    name: forgejo-inline-config
    template:
      engineVersion: v2
      data:
        # Root-level app.ini settings (no section header)
        _generals_: "APP_NAME=The Ebon Enginarium: Dark Dreams Deprave Decrepit Dungeon Dwelling Developer."
        server: |-
          HTTP_PORT=3000
          PROTOCOL=http
          DOMAIN=forgejo.irminsul
          ROOT_URL=https://forgejo.irminsul/
          SSH_DOMAIN=forgejo.irminsul
          SSH_PORT=22
          SSH_LISTEN_PORT=2222
          START_SSH_SERVER=true
          APP_DATA_PATH=/data
          ENABLE_PPROF=false
        database: |-
          DB_TYPE=postgres
          HOST=cnpg-forgejo-rw:5432
          NAME=forgejo
          USER=forgejo
          PASSWD={{ .db_password }}
        indexer: |-
          ISSUE_INDEXER_TYPE=db
          REPO_INDEXER_ENABLED=false
        queue: |-
          TYPE=redis
          CONN_STR=redis://:{{ .valkey_password }}@valkey:6379/0?
        cache: |-
          ADAPTER=redis
          HOST=redis://:{{ .valkey_password }}@valkey:6379/1
        session: |-
          PROVIDER=redis
          PROVIDER_CONFIG=redis://:{{ .valkey_password }}@valkey:6379/2
        # [security] — INSTALL_LOCK must be true to skip the web installer
        security: |-
          INSTALL_LOCK=true
        repository: |-
          ROOT=/data/git/gitea-repositories
        metrics: |-
          ENABLED=false
  refreshPolicy: Periodic
  refreshInterval: 1h0m0s
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: valkey
spec:
  data:
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: kv/nekropolis/forgejo/valkey
        metadataPolicy: None
        property: password
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-backend
  target:
    name: valkey
  refreshPolicy: Periodic
  refreshInterval: 1h0m0s
