hubble:
  enabled: true
  # as per its description, this value is required when using hubble relay
  # https://github.com/cilium/cilium/issues/13537
  listenAddress: ":4244"
  relay:
    enabled: true
  ui:
    enabled: true
    ingress:
      enabled: false

